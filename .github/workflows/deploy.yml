name: Deploy DevOps Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy-infra-and-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # New Step: Pulls the resource group name out of your JSON credentials secret
      - name: Parse Resource Group from Credentials
        id: parse_rg
        run: |
          RG_NAME=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.resourceGroup // "rg-devops-portfolio"')
          echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure via Bicep
        id: bicep_deploy
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ steps.parse_rg.outputs.rg_name }}
          template: ./infra/main.bicep

      - name: Activate Static Hosting and Upload Site Files
        uses: azure/CLI@v2
        with:
          azcliversion: 2.86.0
          inlineScript: |
            STORAGE_NAME="${{ steps.bicep_deploy.outputs.storageAccountName }}"
            echo "Targeting storage account: $STORAGE_NAME"
            az storage blob service-properties update --account-name $STORAGE_NAME --static-website --index-document index.html
            az storage blob upload-batch --account-name $STORAGE_NAME -s ./site -d '$web'