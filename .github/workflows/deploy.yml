name: Deploy DevOps Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy-infra-and-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure via Bicep
        id: bicep_deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: rg-devops-portfolio
          template: ./infra/main.bicep

     -  name: Activate Static Hosting and Upload Site Files
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob service-properties update --account-name devopsportfoliosa1706 --static-website true --index-document index.html --404-document error.html
            az storage blob upload-batch --account-name devopsportfoliosa1706 --auth-mode key -d '$web' -s ./site